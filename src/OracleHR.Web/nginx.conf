server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode 必要設定：
    # 所有找不到的路徑都回傳 index.html，讓 Vue Router 接手處理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取（Vite build 產生的 JS/CSS 有 hash，可長期快取）
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
